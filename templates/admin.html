<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم البوت</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .stat-card { text-align: center; padding: 20px; }
        .stat-value { font-size: 2.5rem; font-weight: bold; color: #0d6efd; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">لوحة تحكم Telegram Bot Pro</span>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <div class="card stat-card">
                    <h5>إجمالي المستخدمين</h5>
                    <div class="stat-value">{{ stats.total_users }}</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card">
                    <h5>إجمالي الرسائل</h5>
                    <div class="stat-value">{{ stats.total_messages }}</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card">
                    <h5>مستخدمين محظورين</h5>
                    <div class="stat-value text-danger">{{ stats.banned_users }}</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header bg-white">
                <h5 class="mb-0">إدارة مفاتيح Gemini API</h5>
            </div>
            <div class="card-body">
                <form id="keysForm">
                    <div class="row">
                        {% for i in range(1, 16) %}
                        <div class="col-md-4 mb-3">
                            <label class="form-label">مفتاح {{ i }}</label>
                            <input type="text" class="form-control" name="key_{{ i }}" value="{{ keys.get('key_' ~ i, '') }}">
                        </div>
                        {% endfor %}
                    </div>
                    <button type="submit" class="btn btn-primary w-100">حفظ المفاتيح</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('keysForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            const response = await fetch('/update_keys', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            
            if ((await response.json()).status === 'success') {
                alert('تم التحديث بنجاح!');
            }
        };
    </script>
</body>
</html>
